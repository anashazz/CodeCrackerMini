<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodeCrackerMini - Redeem Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 999px;
        }
    </style>
</head>
<body class="text-neutral-200 min-h-screen flex flex-col justify-between antialiased selection:bg-indigo-600 selection:text-white">

    <header class="border-b border-neutral-800 bg-black backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3.5 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                <div class="bg-gradient-to-tr from-indigo-700 to-purple-800 p-2 rounded-xl shadow-lg">
                    <i class="fa-solid fa-gift text-base text-white"></i>
                </div>
                <div>
                    <h1 class="text-base md:text-lg font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-300 to-pink-500">
                        CodeCrackerMini
                    </h1>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6 w-full flex-grow flex flex-col gap-6 justify-center">
        
        <div class="grid grid-cols-1 md:grid-cols-5 gap-5">
            
            <div class="md:col-span-3 bg-neutral-900 border border-neutral-800 rounded-2xl p-4 md:p-5 flex flex-col gap-5">
                
                <div>
                    <label class="block text-[10px] md:text-xs font-bold text-neutral-500 uppercase tracking-wider mb-2.5">
                        Step 1: Choose Platform
                    </label>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="selectPlatform('roblox')" id="btn-roblox" class="py-3 px-4 rounded-xl border border-indigo-600 bg-indigo-950/30 text-indigo-300 font-bold text-sm flex items-center justify-center gap-2 transition-all active:scale-[0.98] select-none min-h-[48px]">
                            <i class="fa-solid fa-cube text-lg"></i> Roblox
                        </button>
                        <button onclick="selectPlatform('freefire')" id="btn-freefire" class="py-3 px-4 rounded-xl border border-neutral-800 bg-neutral-950 text-neutral-500 font-semibold text-sm flex items-center justify-center gap-2 transition-all active:scale-[0.98] select-none min-h-[48px]">
                            <i class="fa-solid fa-fire text-lg"></i> Free Fire
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] md:text-xs font-bold text-neutral-500 uppercase tracking-wider mb-2.5">
                        Step 2: Select Amount
                    </label>
                    <div id="reward-options-container" class="grid grid-cols-3 gap-2">
                    </div>
                </div>

                <button id="btn-generate" onclick="generateCode()" class="w-full py-4 bg-white hover:bg-neutral-200 text-black font-extrabold rounded-xl transition-all shadow-lg shadow-white/5 flex items-center justify-center gap-2 tracking-wide transform active:scale-[0.97] text-sm select-none min-h-[50px]">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> GENERATE REDEEM CODE
                </button>
            </div>

            <div id="output-panel" class="md:col-span-2 bg-black border border-neutral-800 rounded-2xl p-4 md:p-5 flex flex-col justify-between min-h-[220px] transition-all duration-300">
                
                <div class="flex items-center gap-2 border-b border-neutral-800 pb-3">
                    <span class="w-2.5 h-2.5 rounded-full bg-indigo-500 animate-pulse"></span>
                    <span class="text-[10px] font-mono font-bold tracking-wider text-neutral-500 uppercase">Live Output</span>
                </div>

                <div id="output-box" class="my-6 text-center flex flex-col items-center justify-center gap-3 min-h-[100px]">
                    <i id="output-icon" class="fa-solid fa-gamepad text-3xl text-neutral-700 transition-all duration-300"></i>
                    <h3 id="output-status" class="text-xs text-neutral-600 font-semibold font-mono px-4">Select values and generate</h3>
                    <div id="output-code" class="hidden text-lg md:text-xl font-mono font-bold text-white tracking-widest bg-neutral-950 border border-neutral-800 px-4 py-2.5 rounded-xl relative overflow-hidden select-all max-w-full break-all">
                        ---
                    </div>
                </div>

                <div id="progress-container" class="hidden w-full bg-neutral-900 rounded-full h-1.5 overflow-hidden mb-4">
                    <div id="progress-bar" class="bg-indigo-600 h-full w-0 transition-all duration-100"></div>
                </div>

                <div id="output-actions" class="hidden flex items-center gap-2 pt-3 border-t border-neutral-800">
                    <button onclick="copyCode()" class="flex-grow py-3 bg-neutral-800 hover:bg-neutral-700 text-white font-bold rounded-xl text-xs flex items-center justify-center gap-1.5 transition-all active:scale-[0.97] select-none min-h-[44px]">
                        <i class="fa-regular fa-copy"></i> Copy Code
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-neutral-950 border border-neutral-800 rounded-2xl p-4 md:p-5">
            <div class="flex items-center justify-between border-b border-neutral-800 pb-3 mb-3">
                <h3 class="text-[10px] md:text-xs font-bold text-neutral-400 uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left text-indigo-500"></i> History Vault
                </h3>
                <button onclick="clearHistory()" class="text-[10px] md:text-xs text-neutral-600 hover:text-red-400 transition-all flex items-center gap-1 select-none py-1 px-2 rounded-lg hover:bg-neutral-900">
                    <i class="fa-solid fa-trash-can"></i> Clear
                </button>
            </div>
            <div id="history-list" class="flex flex-col gap-2 max-h-[180px] overflow-y-auto pr-1"></div>
            <div id="history-empty" class="text-center py-6 text-xs text-neutral-700 font-mono">No codes generated yet</div>
        </div>
    </main>

    <script>
        let currentPlatform = 'roblox';
        let currentAmount = '';
        let isGenerating = false;
        let generatedHistory = [];

        const rewards = {
            roblox: [
                { value: '1,000 Robux', label: '1K Robux' },
                { value: '5,000 Robux', label: '5K Robux' },
                { value: '10,000 Robux', label: '10K Robux' }
            ],
            freefire: [
                { value: '1,080 Diamonds', label: '1,080 Dia' },
                { value: '2,200 Diamonds', label: '2,200 Dia' },
                { value: '5,600 Diamonds', label: '5,600 Dia' }
            ]
        };

        window.onload = function() {
            selectPlatform('roblox');
            loadHistoryFromLocal();
        };

        function selectPlatform(platform) {
            if (isGenerating) return;
            currentPlatform = platform;
            const robloxBtn = document.getElementById('btn-roblox');
            const freeFireBtn = document.getElementById('btn-freefire');

            if (platform === 'roblox') {
                robloxBtn.className = "py-3 px-4 rounded-xl border border-indigo-600 bg-indigo-950/30 text-indigo-300 font-bold text-sm flex items-center justify-center gap-2 transition-all active:scale-[0.98] select-none min-h-[48px]";
                freeFireBtn.className = "py-3 px-4 rounded-xl border border-neutral-800 bg-neutral-950 text-neutral-500 font-semibold text-sm flex items-center justify-center gap-2 transition-all active:scale-[0.98] select-none min-h-[48px]";
            } else {
                freeFireBtn.className = "py-3 px-4 rounded-xl border border-orange-600 bg-orange-950/30 text-orange-300 font-bold text-sm flex items-center justify-center gap-2 transition-all active:scale-[0.98] select-none min-h-[48px]";
                robloxBtn.className = "py-3 px-4 rounded-xl border border-neutral-800 bg-neutral-950 text-neutral-500 font-semibold text-sm flex items-center justify-center gap-2 transition-all active:scale-[0.98] select-none min-h-[48px]";
            }
            renderRewardOptions();
        }

        function renderRewardOptions() {
            const container = document.getElementById('reward-options-container');
            container.innerHTML = '';
            const list = rewards[currentPlatform];
            currentAmount = list[0].value;
            list.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.id = `opt-${index}`;
                btn.onclick = () => selectAmount(item.value, index);
                const isActive = index === 0 ? 'border-neutral-600 text-white bg-neutral-800' : 'border-neutral-800 text-neutral-500';
                btn.className = `py-3 px-2 text-xs font-bold rounded-xl border bg-neutral-950 transition-all select-none active:scale-[0.95] min-h-[44px] ${isActive}`;
                btn.innerText = item.label;
                container.appendChild(btn);
            });
        }

        function selectAmount(val, index) {
            if (isGenerating) return;
            currentAmount = val;
            const list = rewards[currentPlatform];
            list.forEach((item, idx) => {
                const btn = document.getElementById(`opt-${idx}`);
                btn.className = "py-3 px-2 text-xs font-bold rounded-xl border border-neutral-800 bg-neutral-950 text-neutral-500 transition-all select-none active:scale-[0.95] min-h-[44px]";
            });
            document.getElementById(`opt-${index}`).className = "py-3 px-2 text-xs font-bold rounded-xl border border-neutral-600 bg-neutral-800 text-white transition-all select-none active:scale-[0.95] min-h-[44px]";
        }

        function generateCode() {
            if (isGenerating) return;
            isGenerating = true;
            const outputPanel = document.getElementById('output-panel');
            const outputIcon = document.getElementById('output-icon');
            const outputStatus = document.getElementById('output-status');
            const outputCode = document.getElementById('output-code');
            const progressBar = document.getElementById('progress-bar');
            const progressContainer = document.getElementById('progress-container');
            const outputActions = document.getElementById('output-actions');
            const generateBtn = document.getElementById('btn-generate');

            if (window.innerWidth < 768) outputPanel.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            generateBtn.disabled = true;
            outputIcon.className = "fa-solid fa-spinner animate-spin text-3xl text-indigo-500";
            outputStatus.innerText = "Processing...";
            outputCode.classList.add('hidden');
            outputActions.classList.add('hidden');
            progressContainer.classList.remove('hidden');
            progressBar.style.width = '0%';

            let progressValue = 0;
            const interval = setInterval(() => {
                progressValue += 5;
                progressBar.style.width = `${progressValue}%`;
                if (progressValue >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        const cleanCode = mockCodeEngine(currentPlatform);
                        outputIcon.className = currentPlatform === 'roblox' ? "fa-solid fa-cube text-3xl text-indigo-400" : "fa-solid fa-fire text-3xl text-orange-500";
                        outputStatus.innerText = `Decrypted: ${currentAmount}`;
                        outputCode.innerText = cleanCode;
                        outputCode.classList.remove('hidden');
                        outputActions.classList.remove('hidden');
                        progressContainer.classList.add('hidden');
                        addHistory(currentPlatform, currentAmount, cleanCode);
                        generateBtn.disabled = false;
                        isGenerating = false;
                    }, 300);
                }
            }, 80);
        }

        function mockCodeEngine(platform) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            if (platform === 'roblox') {
                let p = Array.from({length:10}, ()=>Math.floor(Math.random()*10)).join('');
                return `${p.slice(0,3)} ${p.slice(3,6)} ${p.slice(6)}`;
            } else {
                let code = Array.from({length:12}, ()=>chars.charAt(Math.floor(Math.random()*chars.length))).join('');
                return `${code.slice(0,4)}-${code.slice(4,8)}-${code.slice(8)}`;
            }
        }

        function addHistory(platform, reward, code) {
            generatedHistory.unshift({ id: Date.now(), platform, reward, code, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
            saveHistoryToLocal();
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            document.getElementById('history-empty').classList.toggle('hidden', generatedHistory.length > 0);
            list.innerHTML = generatedHistory.map(item => `
                <div class="p-3 bg-neutral-900 border border-neutral-800 rounded-xl flex items-center justify-between text-xs">
                    <div class="flex items-center gap-2">
                        <span class="${item.platform === 'roblox' ? 'text-indigo-400' : 'text-orange-500'}"><i class="fa-solid ${item.platform === 'roblox' ? 'fa-cube' : 'fa-fire'}"></i></span>
                        <div>
                            <div class="font-bold text-neutral-200">${item.reward}</div>
                            <div class="text-[9px] text-neutral-500">${item.time}</div>
                        </div>
                    </div>
                    <div class="font-mono text-white">${item.code}</div>
                </div>
            `).join('');
        }

        function copyCode() {
            const text = document.getElementById('output-code').innerText;
            const area = document.createElement('textarea');
            area.value = text;
            document.body.appendChild(area);
            area.select();
            document.execCommand('copy');
            document.body.removeChild(area);
        }

        function clearHistory() {
            generatedHistory = [];
            saveHistoryToLocal();
            renderHistory();
        }

        function saveHistoryToLocal() { localStorage.setItem('codecrackermini_history_v2', JSON.stringify(generatedHistory)); }
        function loadHistoryFromLocal() {
            const stored = localStorage.getItem('codecrackermini_history_v2');
            if (stored) { generatedHistory = JSON.parse(stored); renderHistory(); }
        }
    </script>

    <footer class="border-t border-neutral-900 bg-black py-4 text-center text-[10px] text-neutral-600 px-4">
        <p>Made by Anas Hafeez, Internet Name: Anashazz</p>
    </footer>
</body>
</html>
